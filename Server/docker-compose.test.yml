services:
  bideyati_test_db:
    image: postgres:16
    container_name: bideyati_test_db
    environment:
      POSTGRES_USER: bideyati
      POSTGRES_PASSWORD: bideyati
      POSTGRES_DB: bideyati_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bideyati -d bideyati_test"]
      interval: 5s
      timeout: 3s
      retries: 20

